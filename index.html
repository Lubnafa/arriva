<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>arrivia — AI Concierge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1714;
      --sand: #f4efe6;
      --gold: #b8956a;
      --gold-soft: #d4b896;
      --cream: #faf7f2;
      --paper: #ffffff;
      --muted: #6b635c;
      --border: rgba(26, 23, 20, 0.12);
      --warn-bg: #fff8e9;
      --warn-border: rgba(184, 149, 106, 0.45);
      --header-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Outfit", system-ui, sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--ink);
      background: var(--sand);
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font-family: inherit; font-size: inherit; }

    .app-shell {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      height: var(--header-h);
      padding: 0 1.35rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1.55rem;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .brand-tag {
      font-family: "DM Mono", monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-shrink: 0;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink);
      padding: 0.45rem 0.95rem;
      border-radius: 2px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .btn:hover { background: var(--sand); border-color: rgba(26,23,20,0.22); }

    .btn-primary {
      background: var(--ink);
      color: var(--sand);
      border-color: var(--ink);
    }

    .btn-primary:hover { background: #2f2924; border-color: #2f2924; }

    .btn-concierge {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.05rem;
      padding: 0.5rem 1.15rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--ink);
    }

    .btn-concierge:hover { background: rgba(184,149,106,0.12); }

    .workspace {
      flex: 1;
      padding: 1.15rem;
      overflow: hidden;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: minmax(220px, 0.95fr) minmax(220px, 0.85fr) minmax(280px, 1.35fr);
      gap: 1rem;
      height: calc(100vh - var(--header-h) - 2.3rem);
      max-width: 1440px;
      margin: 0 auto;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1.2rem;
    }

    .panel-body {
      padding: 0.85rem 1rem;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label.mini {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: "DM Mono", monospace;
    }

    .field {
      padding: 0.45rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--cream);
      font-family: "DM Mono", monospace;
      font-size: 0.78rem;
    }

    select.field { cursor: pointer; }

    .muted { color: var(--muted); font-size: 0.82rem; }

    .pill {
      font-family: "DM Mono", monospace;
      font-size: 0.68rem;
      padding: 0.22rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: inline-block;
      margin: 0.15rem 0.35rem 0.15rem 0;
      background: var(--sand);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .list-row {
      padding: 0.55rem 0.62rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .list-row:hover { background: rgba(244,239,230,0.55); }

    .list-row.selected {
      border-color: var(--gold);
      background: rgba(184,149,106,0.1);
    }

    .reco-card {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.75rem 0.85rem;
      display: grid;
      gap: 0.35rem;
    }

    .reco-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.15rem;
      font-weight: 600;
    }

    /* —— Drawer —— */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26, 23, 20, 0.3);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .drawer-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 420px;
      max-width: 100%;
      height: 100%;
      background: var(--paper);
      z-index: 200;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .drawer.open { transform: translateX(0); }

    .drawer-top {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .drawer-top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .drawer-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1.38rem;
      line-height: 1.15;
    }

    .drawer-member {
      font-family: "DM Mono", monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.22rem;
    }

    .icon-btn {
      width: 2.05rem;
      height: 2.05rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--sand);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      padding: 0;
      flex-shrink: 0;
    }

    .icon-btn:hover { background: rgba(244,239,230,0.75); }

    .api-row {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .api-row label {
      font-family: "DM Mono", monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .api-row input[type="password"] {
      padding: 0.35rem 0.45rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--cream);
      font-family: "DM Mono", monospace;
      font-size: 0.72rem;
    }

    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      min-height: 0;
    }

    .msg {
      display: flex;
      gap: 0.55rem;
      max-width: 100%;
      animation: msgIn 0.38s ease-out both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 2rem;
      height: 2rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 0.62rem;
      flex-shrink: 0;
      background: var(--sand);
      color: var(--ink);
      letter-spacing: 0.06em;
    }

    .msg.user .msg-avatar { visibility: hidden; width: 0; margin: 0; overflow: hidden; border: none; }

    .msg-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      max-width: min(100%, 300px);
    }

    .msg.user .msg-bubble-wrap {
      align-items: flex-end;
      max-width: min(100%, 300px);
    }

    .msg-bubble {
      padding: 0.62rem 0.72rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      line-height: 1.52;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.ai .msg-bubble {
      background: var(--paper);
      color: var(--ink);
    }

    .msg.user .msg-bubble {
      background: var(--ink);
      color: var(--sand);
      border-color: var(--ink);
    }

    .msg.warn .msg-bubble {
      background: var(--warn-bg);
      border-color: var(--warn-border);
    }

    .msg-ts {
      font-family: "DM Mono", monospace;
      font-size: 0.62rem;
      color: var(--muted);
      padding: 0 0.08rem;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      margin-top: 0.55rem;
    }

    .chip {
      cursor: pointer;
      border: 1px solid var(--gold-soft);
      background: transparent;
      color: var(--ink);
      font-size: 0.78rem;
      padding: 0.42rem 0.72rem;
      border-radius: 2px;
      font-family: "Outfit", sans-serif;
      font-weight: 500;
      transition: background 0.12s, border-color 0.12s;
    }

    .chip:hover {
      background: rgba(184,149,106,0.12);
      border-color: var(--gold);
    }

    .typing-row {
      display: none;
      align-items: flex-end;
      gap: 0.55rem;
      animation: msgIn 0.32s ease-out both;
    }

    .typing-row.visible { display: flex; }

    .typing-dots {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      padding: 0.7rem 0.95rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--cream);
    }

    .typing-dots span {
      width: 0.39rem;
      height: 0.39rem;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.1s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

    @keyframes blink {
      0%, 70%, 100% { opacity: 0.25; transform: translateY(0); }
      35% { opacity: 1; transform: translateY(-2px); }
    }

    .stream-cursor {
      display: inline-block;
      width: 0.45em;
      height: 1em;
      background: var(--gold);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: curBlink 0.85s step-end infinite;
    }

    @keyframes curBlink { 50% { opacity: 0; } }

    .chat-input-bar {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.45rem;
      align-items: flex-end;
      background: var(--cream);
    }

    .chat-input-bar textarea {
      flex: 1;
      resize: none;
      min-height: 2.6rem;
      max-height: 7rem;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--paper);
      line-height: 1.45;
    }

    .send-btn {
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--sand);
      border-radius: 2px;
      cursor: pointer;
      font-weight: 500;
      height: 2.6rem;
    }

    .send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    @media (max-width: 1020px) {
      .grid-3 {
        grid-template-columns: 1fr;
        height: auto;
      }
      .panel { min-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-name">arrivia</span>
        <span class="brand-tag">Travel loyalty · MCP concierge</span>
      </div>
      <div class="top-actions">
        <button type="button" class="btn btn-concierge" id="openDrawerBtn" aria-haspopup="dialog" aria-controls="conciergeDrawer">Talk to Concierge →</button>
        <button type="button" class="btn btn-primary" id="resetBtn">Reset</button>
      </div>
    </header>

    <main class="workspace">
      <div style="margin:0 auto 0.95rem; max-width:1440px; display:grid; gap:0.65rem;">
        <label class="mini">
          MCP server base URL
          <input class="field" id="mcpBaseUrl" type="url" autocomplete="off" spellcheck="false" />
        </label>
        <label class="mini">
          Partner MCP API key (Bearer)
          <input class="field" id="partnerApiKey" type="password" autocomplete="off" placeholder="Paste partner key" spellcheck="false" />
        </label>
      </div>

      <div class="grid-3">
        <section class="panel" aria-label="Members">
          <div class="panel-header">Members</div>
          <div class="panel-body" id="memberList"></div>
        </section>
        <section class="panel" aria-label="Partners">
          <div class="panel-header">Partners</div>
          <div class="panel-body" id="partnerList"></div>
        </section>
        <section class="panel" aria-label="Recommendations">
          <div class="panel-header">Recommendations</div>
          <div class="panel-body">
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
              <button type="button" class="btn btn-primary" id="loadRecommendationsBtn">Load recommendations</button>
              <span class="muted" id="recoStatus"></span>
            </div>
            <div id="appliedRules"></div>
            <div id="recoList" style="display:flex; flex-direction:column; gap:0.55rem;"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

  <aside
    class="drawer"
    id="conciergeDrawer"
    role="dialog"
    aria-modal="true"
    aria-label="AI Concierge"
    aria-hidden="true"
    hidden
  >
    <div class="drawer-top">
      <div class="drawer-top-row">
        <div>
          <div class="drawer-title">AI Concierge</div>
          <div class="drawer-member" id="drawerMemberLine"></div>
        </div>
        <button type="button" class="icon-btn" id="closeDrawerBtn" aria-label="Close concierge">×</button>
      </div>
      <div class="api-row">
        <label for="anthropicApiKey">API Key</label>
        <input
          id="anthropicApiKey"
          type="password"
          placeholder="sk-ant-api03-…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <div class="chat-scroll" id="chatScroll" role="log" aria-live="polite" aria-relevant="additions"></div>

    <div class="typing-row" id="typingIndicator" aria-hidden="true">
      <div class="msg-avatar" aria-label="arrivia">arv</div>
      <div class="typing-dots" aria-label="Concierge is typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="chat-input-bar">
      <textarea id="chatInput" rows="1" placeholder="Ask about your trip…" aria-label="Message to concierge"></textarea>
      <button type="button" class="send-btn" id="sendBtn" aria-label="Send message" disabled>Send</button>
    </div>
  </aside>

  <script>
(function () {
  const TOOL = {
    GET_MEMBER_RECOMMENDATIONS: "get_member_recommendations",
    GET_MEMBER_PROFILE: "get_member_profile",
    GET_PARTNER_RULES: "get_partner_rules",
  };

  const MEMBERS = [
    { id: "11111111-1111-4111-8111-111111111111", label: "Jordan Lee", note: "Gold · Paris history" },
    { id: "22222222-2222-4222-8222-222222222222", label: "Sam Rivera", note: "Silver · New explorer" },
    { id: "33333333-3333-4333-8333-333333333333", label: "Alex Chen", note: "Platinum · Frequent flyer" },
  ];

  const PARTNERS = [
    { id: "partner_integration", label: "Partner Integration (demo)" },
  ];

  const DEST_LABELS = {
    dest_paris: "Paris",
    dest_alaska: "Alaska",
    dest_tokyo: "Tokyo",
    dest_cabo: "Cabo San Lucas",
  };

  const SYSTEM_PROMPT_BASE = `You are an expert AI travel concierge for arrivia, a global travel loyalty technology company. You help bank and credit union members find the best travel options based on their loyalty tier and history.

Your personality:
- Warm, knowledgeable, and concise
- You speak like a high-end travel consultant
- You never use bullet points in chat — write in flowing sentences
- You are honest about limitations (partner rules, tier restrictions)

You have access to the member's profile and recommendations that have already been loaded in the app. When the user asks about recommendations, explain them conversationally — destination, why it suits them, points value, and any relevant partner restrictions.

When partner rules have filtered something out, explain it naturally:
"Since your membership doesn't include cruise offers, I've focused on flights and hotel packages for you."

Keep responses under 120 words unless the user asks for more detail.`;

  let selectedMemberId = null;
  let selectedPartnerId = null;
  let memberProfile = null;
  let partnerRules = null;
  let recommendations = [];
  let appliedRules = [];
  let loadError = null;

  /** Claude API: user + assistant only; greeting uses localOnly in UI layer */
  let conversationHistory = [];

  /** @type {string[]} */
  let drawerFocusTrapOrder = [];

  /** @type {HTMLElement|null} */
  let drawerLastFocus = null;

  let userSentFirstMessage = false;

  let typingTimer = null;
  let typingShown = false;
  /** @type {AbortController|null} */
  let streamAbort = null;

  const qs = (id) => document.getElementById(id);

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }

  function hhmm(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function categoryToBookingType(cat) {
    const c = (cat || "").toLowerCase();
    if (c === "cruise") return "cruise package";
    if (c === "beach") return "resort and air bundle";
    if (c === "city") return "flight plus hotel city stay";
    return "travel package";
  }

  function pointsFromScore(score) {
    return Math.round(Number(score) * 48000 + 12000);
  }

  function rationaleForReco(r, profile) {
    const parts = [];
    if (profile && profile.tier) parts.push("Weighted for your " + profile.tier + " tier benefits.");
    if (profile && profile.past_destinations && profile.past_destinations.includes(r.destination_id)) {
      parts.push("We kept some contrast with destinations you already enjoyed.");
    }
    parts.push("Ranked using arrivia leisure-travel affinity signals tied to partner inventory.");
    return parts.join(" ");
  }

  function buildAppContextJsonBlock() {
    const block = {};

    if (memberProfile && selectedMemberId) {
      block.member = {
        member_id: memberProfile.member_id,
        loyalty_tier: memberProfile.tier,
        travel_history: (memberProfile.past_destinations || []).map((destId) => ({
          destination: DEST_LABELS[destId] || destId,
          destination_id: destId,
          types: ["leisure"],
        })),
      };
    }

    if (partnerRules != null && selectedPartnerId) {
      var mult =
        partnerRules.tier_multipliers && memberProfile
          ? partnerRules.tier_multipliers[memberProfile.tier] ?? null
          : null;
      block.partner = {
        partner_name: selectedPartnerId,
        max_recommendations: partnerRules.max_recommendations ?? null,
        excluded_types: partnerRules.exclude_categories || [],
        multiplier: mult,
        tier_multipliers: partnerRules.tier_multipliers || null,
      };
    }

    if (Array.isArray(recommendations) && recommendations.length > 0) {
      block.recommendations = recommendations.map((r) => ({
        destination: r.destination_name,
        bookingType: categoryToBookingType(r.category),
        estimatedPointsValue: pointsFromScore(r.score),
        confidence: Number(Number(r.score).toFixed(3)),
        rationale: rationaleForReco(r, memberProfile),
      }));
    }

    if (appliedRules && appliedRules.length) block.applied_partner_rules_from_mcp = appliedRules;
    if (loadError) block.last_mcp_note = loadError;

    const jsonStr = JSON.stringify(block, null, 2);

    const lines = SYSTEM_PROMPT_BASE.split("\n");
    lines.push("", "Current concierge context (trust this JSON snapshot; synthesise naturally for the traveller):", "```json", jsonStr, "```");

    return lines.join("\n");
  }

  function anthropicPayload(userText, stream) {
    const msgs = conversationHistory.concat([{ role: "user", content: userText }]);
    return {
      model: "claude-sonnet-4-20250514",
      max_tokens: 400,
      stream: !!stream,
      system: buildAppContextJsonBlock(),
      messages: msgs.map((m) => ({ role: m.role, content: m.content })),
    };
  }

  async function mcpInvoke(toolName, args) {
    const base = qs("mcpBaseUrl").value.replace(/\/$/, "");
    const key = qs("partnerApiKey").value.trim();
    const url = base + "/v1/mcp/invoke";
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + key,
      },
      body: JSON.stringify({ tool_name: toolName, arguments: args }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error ? data.error + (data.code ? " (" + data.code + ")" : "") : res.statusText || "HTTP " + res.status);
    return data;
  }

  function renderLists() {
    const mEl = qs("memberList");
    const pEl = qs("partnerList");
    mEl.innerHTML = MEMBERS.map(
      (m) =>
        `<button type="button" class="list-row${selectedMemberId === m.id ? " selected" : ""}" data-member="${esc(m.id)}">
          <div style="font-weight:600">${esc(m.label)}</div>
          <div class="muted" style="font-size:0.8rem">${esc(m.note)}</div>
          <div class="pill">${esc(m.id.slice(0, 8))}…</div>
        </button>`
    ).join("");
    mEl.querySelectorAll("[data-member]").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedMemberId = btn.getAttribute("data-member");
        memberProfile = null;
        renderLists();
        refreshDrawerHeader();
      });
    });

    pEl.innerHTML = PARTNERS.map(
      (p) =>
        `<button type="button" class="list-row${selectedPartnerId === p.id ? " selected" : ""}" data-partner="${esc(p.id)}">
          <div style="font-weight:600">${esc(p.label)}</div>
          <div class="pill">${esc(p.id)}</div>
        </button>`
    ).join("");
    pEl.querySelectorAll("[data-partner]").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedPartnerId = btn.getAttribute("data-partner");
        partnerRules = null;
        renderLists();
        refreshDrawerHeader();
      });
    });
  }

  function renderRecommendations() {
    const list = qs("recoList");
    const rulesEl = qs("appliedRules");
    list.innerHTML = "";
    rulesEl.innerHTML = "";
    if (!recommendations.length) return;
    if (appliedRules.length) {
      rulesEl.innerHTML =
        '<div class="muted" style="margin-bottom:0.35rem;font-family:&quot;DM Mono&quot;,monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;">Applied partner rules</div>' +
        appliedRules.map((r) => `<span class="pill">${esc(r)}</span>`).join("");
    }
    list.innerHTML = recommendations
      .map(
        (r) =>
          `<div class="reco-card">
            <div class="reco-title">${esc(r.destination_name)}</div>
            <div class="muted">${esc(categoryToBookingType(r.category))}</div>
            <div style="font-family:&quot;DM Mono&quot;,monospace;font-size:0.75rem;">score ${esc(Number(r.score).toFixed(3))} · ~${esc(pointsFromScore(r.score))} pts</div>
          </div>`
      )
      .join("");
  }

  function partnerDisplayName() {
    const p = PARTNERS.find((x) => x.id === selectedPartnerId);
    return p ? p.label : selectedPartnerId || "";
  }

  function greetingText() {
    if (!selectedMemberId) {
      return "Hello! I'm your arrivia travel concierge. To get started, select a member and partner on the left, then I can help you explore your personalised recommendations.";
    }
    if (!recommendations.length) {
      const tier = (memberProfile && memberProfile.tier) || "valued";
      const pn = partnerDisplayName();
      return "Welcome back, " + tier + " member. I can see you're browsing with " + pn + ". Would you like me to pull up your travel recommendations?";
    }
    var top = recommendations[0];
    var N = recommendations.length;
    var brief =
      rationaleForReco(top, memberProfile).length > 120
        ? rationaleForReco(top, memberProfile).slice(0, 117) + "…"
        : rationaleForReco(top, memberProfile);
    return (
      "I've got " +
      N +
      " recommendation" +
      (N === 1 ? "" : "s") +
      " ready for you. Your top pick is " +
      top.destination_name +
      " — " +
      brief +
      " Shall I walk you through them?"
    );
  }

  function refreshDrawerHeader() {
    var line = qs("drawerMemberLine");
    if (!selectedMemberId) line.textContent = "No member selected";
    else {
      var mb = MEMBERS.find((x) => x.id === selectedMemberId);
      line.textContent = mb ? "Member · " + mb.label : "Member · " + selectedMemberId;
    }
  }

  /** @returns {HTMLElement} */
  function appendBubble(role, htmlContent, variant, opts) {
    opts = opts || {};
    var scroll = qs("chatScroll");
    var row = document.createElement("div");
    row.className = "msg " + (role === "user" ? "user" : "ai") + (variant === "warn" ? " warn" : "");

    var av = document.createElement("div");
    av.className = "msg-avatar";
    if (role === "user") {
      av.textContent = "";
      av.setAttribute("aria-hidden", "true");
    } else {
      av.textContent = "arv";
      av.setAttribute("aria-label", "arrivia");
    }

    var wrap = document.createElement("div");
    wrap.className = "msg-bubble-wrap";

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = opts.streamCursor ? htmlContent + '<span class="stream-cursor" aria-hidden="true"></span>' : htmlContent;

    var ts = document.createElement("div");
    ts.className = "msg-ts";
    ts.textContent = hhmm(opts.ts || Date.now());

    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    row.appendChild(av);
    row.appendChild(wrap);
    scroll.appendChild(row);
    scroll.scrollTop = scroll.scrollHeight;
    return bubble;
  }

    function clearChatDOM() {
      qs("chatScroll").innerHTML = "";
      qs("typingIndicator").classList.remove("visible");
      hideTypingSoon();
    }

    function renderGreetingUi() {
      clearChatDOM();
      userSentFirstMessage = false;
      var greeting = greetingText();
      var bubbleBody =
        "<div>" +
        esc(greeting) +
        "</div>" +
        '<div class="suggestions" id="suggestionChips">' +
        '<button type="button" class="chip" data-chip="What\u2019s my best option?">What\u2019s my best option?</button>' +
        '<button type="button" class="chip" data-chip="Explain the partner rules">Explain the partner rules</button>' +
        '<button type="button" class="chip" data-chip="Which gives the most points?">Which gives the most points?</button>' +
        "</div>";
    appendBubble("assistant", bubbleBody, null, {});
    qs("chatScroll").querySelectorAll(".chip").forEach(function (chip) {
      chip.addEventListener("click", function () {
        qs("chatInput").value = chip.getAttribute("data-chip") || "";
        sendChat();
      });
    });
  }

  function removeSuggestionChips() {
    var c = qs("suggestionChips");
    if (c) c.remove();
  }

  function showTypingIndicator() {
    typingShown = true;
    var t = qs("typingIndicator");
    t.classList.add("visible");
    t.setAttribute("aria-hidden", "false");
  }

  function hideTypingIndicator() {
    typingShown = false;
    var t = qs("typingIndicator");
    t.classList.remove("visible");
    t.setAttribute("aria-hidden", "true");
  }

  function hideTypingSoon() {
    if (typingTimer) clearTimeout(typingTimer);
    typingTimer = null;
    hideTypingIndicator();
  }

  /** schedule typing indicator — only after request runs past 500ms */
  function scheduleTypingLag() {
    hideTypingSoon();
    typingShown = false;
    typingTimer = setTimeout(function () {
      showTypingIndicator();
    }, 500);
  }

  function setDrawerOpen(open) {
    var d = qs("conciergeDrawer");
    var bd = qs("drawerBackdrop");
    d.hidden = !open;
    bd.hidden = !open;
    d.setAttribute("aria-hidden", open ? "false" : "true");

    requestAnimationFrame(function () {
      d.classList.toggle("open", open);
      bd.classList.toggle("visible", open);
    });

    if (open) {
      drawerLastFocus = document.activeElement;
      refreshDrawerHeader();
      if (conversationHistory.length === 0) renderGreetingUi();
      else renderChatHistoryOnly();

      var trap = [];
      var root = qs("conciergeDrawer");
      root.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])').forEach(function (el) {
        if (!el.disabled && !el.hidden && el.tabIndex !== -1) trap.push(el);
      });
      drawerFocusTrapOrder = trap;
      window.setTimeout(function () {
        qs("chatInput").focus();
      }, 50);
    } else {
      drawerFocusTrapOrder = [];
      if (drawerLastFocus && typeof drawerLastFocus.focus === "function") drawerLastFocus.focus();
      drawerLastFocus = null;
    }
  }

  /** Re-render persisted messages without greeting */
  function renderChatHistoryOnly() {
    qs("chatScroll").innerHTML = "";
    conversationHistory.forEach(function (m) {
      appendBubble(m.role === "user" ? "user" : "assistant", "<div>" + esc(m.content) + "</div>", null, {});
    });
  }

  function appendErrorBubble(text, isWarn) {
    hideTypingSoon();
    appendBubble("assistant", "<div>" + esc(text) + "</div>", isWarn ? "warn" : null, {});
    qs("sendBtn").disabled = false;
  }

  /** Parse Anthropic SSE stream */
  async function readAnthropicStream(response, bubbleEl) {
    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buf = "";

    /** @returns {HTMLElement} */
    function bubbleContentRoot() {
      return bubbleEl.querySelector(":scope > .stream-text") || bubbleEl;
    }

    /** @returns {HTMLElement|null} */
    function cursorEl() {
      return bubbleEl.querySelector(".stream-cursor");
    }

    function ensureCursor() {
      if (!cursorEl()) {
        var c = document.createElement("span");
        c.className = "stream-cursor";
        c.setAttribute("aria-hidden", "true");
        bubbleEl.appendChild(c);
      }
    }

    function handleEvent(evName, payload) {
      if (evName === "error") throw new Error((payload.error && payload.message) || (payload.error && payload.error.message) || "Stream error");

      var type = payload && payload.type;
      if (type === "content_block_delta" && payload.delta) {
        var d = payload.delta;
        var text = "";
        if (d.type === "text_delta" && typeof d.text === "string") text = d.text;
        else if (typeof d.text === "string") text = d.text;

        if (text) {
          var span = bubbleContentRoot();
          if (cursorEl()) cursorEl().remove();
          span.appendChild(document.createTextNode(text));
          ensureCursor();
          qs("chatScroll").scrollTop = qs("chatScroll").scrollHeight;
        }
      }
    }

    try {
      for (;;) {
        var next = await reader.read();
        if (next.done) break;
        buf += decoder.decode(next.value, { stream: true });
        var chunks = buf.split(/\r?\n\r?\n/);
        buf = chunks.pop() || "";

        chunks.forEach(function (chunkRaw) {
          var lines = chunkRaw.split(/\r?\n/);
          var evLine = "";
          var dataLines = [];

          lines.forEach(function (line) {
            var t = line.trim();
            if (!t.length || t.charAt(0) === ":") return;
            if (t.startsWith("event:")) evLine = t.slice(6).trim();
            if (t.startsWith("data:")) dataLines.push(t.slice(5).trimStart());
          });

          if (!dataLines.length) return;

          try {
            var payload = JSON.parse(dataLines.join("\n"));
            if (payload.type === "message_stop" || evLine === "message_stop") {
              if (cursorEl()) cursorEl().remove();
              return;
            }
            handleEvent(evLine, payload);
          } catch (e) {
            /* ignore partial parse */
          }
        });
      }
    } finally {
      if (cursorEl()) cursorEl().remove();
    }
  }

  async function sendChat() {
    var key = qs("anthropicApiKey").value.trim();
    var input = qs("chatInput");
    var text = input.value.trim();
    if (!text) return;

    if (!key) {
      appendErrorBubble("Please enter a valid Anthropic API key above to activate the AI concierge.", true);
      return;
    }

    removeSuggestionChips();
    if (!userSentFirstMessage) userSentFirstMessage = true;

    appendBubble("user", "<div>" + esc(text) + "</div>", null, {});
    input.value = "";
    qs("sendBtn").disabled = true;

    scheduleTypingLag();

    var useStream = true;
    streamAbort = new AbortController();

    try {
      var res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
        },
        body: JSON.stringify(anthropicPayload(text, useStream)),
        signal: streamAbort.signal,
      });

      if (!res.ok) {
        var errBody = await res.json().catch(function () { return {}; });
        var code = errBody.error && errBody.error.type ? errBody.error.type : String(res.status);
        var detail = errBody.error && errBody.error.message ? " — " + errBody.error.message : "";
        throw new Error("Request failed · " + code + detail);
      }

      hideTypingSoon();

      var aiBubble = appendBubble("assistant", '<div class="stream-text"></div>', null, { streamCursor: true });

      if (!res.body) throw new Error("Empty response body");

      var ct = res.headers.get("content-type") || "";

      /** Some environments return JSON bodies even when streaming was requested; fall back cleanly. */

      if (ct.includes("application/json")) {
        var dataJson = await res.json();
        var txtJ = "";
        if (Array.isArray(dataJson.content)) {
          var b0 = dataJson.content[0];
          txtJ = b0 && b0.text != null ? b0.text : "";
        }
        var rj = aiBubble.querySelector(".stream-text");
        if (rj) rj.textContent = txtJ;
        var cj = aiBubble.querySelector(".stream-cursor");
        if (cj) cj.remove();
        conversationHistory.push({ role: "user", content: text });
        conversationHistory.push({ role: "assistant", content: txtJ });
        qs("sendBtn").disabled = false;
        return;
      }

      await readAnthropicStream(res, aiBubble);

      var textRoot = aiBubble.querySelector(".stream-text");

      var finalText = textRoot ? textRoot.textContent.trim() : aiBubble.textContent.trim();

      conversationHistory.push({ role: "user", content: text });
      conversationHistory.push({ role: "assistant", content: finalText || "(No text returned.)" });

      if (!finalText) {
        if (textRoot) textRoot.textContent = "(No text returned.)";
      }

      qs("sendBtn").disabled = false;
    } catch (e) {
      hideTypingSoon();
      var msg = e && e.message ? String(e.message) : "Something went wrong";
      conversationHistory.push({ role: "user", content: text });
      appendErrorBubble("The concierge couldn't reach Claude: " + msg + ". If this was a browser network error, verify CORS or use a lightweight proxy.", true);
      qs("sendBtn").disabled = false;
    }
  }

  qs("openDrawerBtn").addEventListener("click", function () { setDrawerOpen(true); });

  qs("closeDrawerBtn").addEventListener("click", function () { setDrawerOpen(false); });

  qs("drawerBackdrop").addEventListener("click", function () { setDrawerOpen(false); });

  qs("sendBtn").addEventListener("click", sendChat);

  qs("chatInput").addEventListener("input", function () {
    qs("sendBtn").disabled = !qs("chatInput").value.trim();
  });

  qs("chatInput").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  });

  document.addEventListener("keydown", function (e) {
    var d = qs("conciergeDrawer");
    if (!d.classList.contains("open")) return;
    if (e.key === "Escape") {
      e.preventDefault();
      setDrawerOpen(false);
    }

    /** focus trap Tab */
    if (e.key === "Tab" && drawerFocusTrapOrder.length) {
      var list = drawerFocusTrapOrder;
      var idx = list.indexOf(document.activeElement);
      if (idx === -1) {
        e.preventDefault();
        list[e.shiftKey ? list.length - 1 : 0].focus();
        return;
      }
      var next = e.shiftKey ? (idx - 1 + list.length) % list.length : (idx + 1) % list.length;
      e.preventDefault();
      list[next].focus();
    }
  });

  async function loadFromMcp() {
    qs("recoStatus").textContent = "";
    loadError = null;
    recommendations = [];
    appliedRules = [];
    renderRecommendations();

    if (!selectedMemberId || !selectedPartnerId) {
      qs("recoStatus").textContent = "Select a member and partner first.";
      return;
    }

    try {
      qs("recoStatus").textContent = "Loading…";
      var prof = await mcpInvoke(TOOL.GET_MEMBER_PROFILE, { member_id: selectedMemberId });
      memberProfile = prof.profile;

      var rules = await mcpInvoke(TOOL.GET_PARTNER_RULES, { partner_id: selectedPartnerId });
      partnerRules = rules.rules;

      var reco = await mcpInvoke(TOOL.GET_MEMBER_RECOMMENDATIONS, {
        member_id: selectedMemberId,
        partner_id: selectedPartnerId,
      });
      recommendations = reco.recommendations || [];
      appliedRules = reco.applied_rules || [];
      qs("recoStatus").textContent = recommendations.length + " loaded";
      renderRecommendations();
      refreshDrawerHeader();
      if (qs("conciergeDrawer").classList.contains("open") && conversationHistory.length === 0)
        renderGreetingUi();
    } catch (e) {
      loadError = e && e.message ? e.message : "MCP error";
      qs("recoStatus").textContent = loadError;
    }
  }

  qs("loadRecommendationsBtn").addEventListener("click", loadFromMcp);

    qs("resetBtn").addEventListener("click", function () {
      selectedMemberId = null;
      selectedPartnerId = null;
      memberProfile = null;
      partnerRules = null;
      recommendations = [];
      appliedRules = [];
      loadError = null;
      conversationHistory = [];
      qs("recoStatus").textContent = "";
      renderLists();
      renderRecommendations();
      refreshDrawerHeader();
      if (!qs("conciergeDrawer").classList.contains("open")) clearChatDOM();
      else renderGreetingUi();
    });

  qs("conciergeDrawer").addEventListener("keydown", function (e) {
    /** tab trap handled globally */
  });

  renderLists();
  refreshDrawerHeader();

  (function defaultMcpBase() {
    var el = qs("mcpBaseUrl");
    var o = window.location.origin;
    if (!el.value.trim()) el.value = o && o !== "null" ? o.replace(/\/$/, "") : "http://localhost:3000";
  })();
})();
  </script>
